[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.bandit]
# Test files use assert (pytest convention) and literal /tmp paths as mock
# data, not real filesystem access - neither is a security issue.
exclude_dirs = ["tests"]
